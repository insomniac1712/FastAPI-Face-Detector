services:

  db:
    image: postgres:15

    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facedb

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: ./backend

    container_name: fastapi_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - db


  frontend:
    build: ./frontend

    container_name: frontend_ui

    ports:
      - "3000:80"

    depends_on:
      - backend


volumes:
  postgres_data: